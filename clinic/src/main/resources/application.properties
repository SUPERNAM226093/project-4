server.port=8081
spring.application.name=clinic


spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${CLINIC_DB_PORT:3306}/${CLINIC_DB_NAME:clinic}?createDatabaseIfNotExist=true

spring.datasource.username=${CLINIC_DB_USER:root}
spring.datasource.password=${CLINIC_DB_PASS:}

server.port=${SERVER_PORT:8081}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.orm.results.query=ERROR


# JWT Configuration
jwt.secret=${JWT_SECRET:clinicSecretKeyForJWTtokenGeneration2026DefaultDevKey}
jwt.expiration=86400000

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_EMAIL:}
spring.mail.password=${APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Chatbot session (MySQL chat_sessions, thay Redis)
chat.session.ttl-minutes=${CHAT_SESSION_TTL_MINUTES:30}

# HuggingFace API Configuration
hf.token=${HF_TOKEN:}

# Groq API Configuration
