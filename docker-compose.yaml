# Cấu hình khởi chạy môi trường bằng Docker Compose (Dành cho việc test/triển khai nhanh)
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: clinic-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinic
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./clinic/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: clinic-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

  backend:
    image: clinic-backend:latest
    build:
      context: ./clinic
      dockerfile: Dockerfile
    container_name: clinic-backend
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=mysql
      - CLINIC_DB_PORT=3306
      - CLINIC_DB_NAME=clinic
      - CLINIC_DB_USER=root
      - CLINIC_DB_PASS=root
      - REDIS_HOST=redis
      - ML_BACKEND_URL=http://ml-backend:5000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./clinic/public:/app/public
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  client:
    image: clinic-client:latest
    build:
      context: ./client-clinic
      dockerfile: Dockerfile
    container_name: clinic-client
    ports:
      - "5174:5173"
    environment:
      - INTERNAL_API_URL=http://backend:8080
      - NEXT_PUBLIC_API_URL=http://localhost:8081
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    image: clinic-admin:latest
    build:
      context: ./admin/admin-clinic
      dockerfile: Dockerfile
    container_name: clinic-admin
    ports:
      - "3001:3000"
    environment:
      - BACKEND_URL=http://backend:8080
      - DOCKER=true
    depends_on:
      - backend
    restart: unless-stopped

  ml-backend:
    image: clinic-ml-backend:latest
    build:
      context: ./heart-predict-model
      dockerfile: Dockerfile
    container_name: clinic-ml-backend
    ports:
      - "5001:5000"
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
